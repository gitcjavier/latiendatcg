[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10.11.0"

# `publish` sirve los assets estáticos de Astro (CSS, JS de cliente).
# La función SSR se registra automáticamente vía .netlify/v1/config.json
# (Frameworks API) que escribe el adapter @astrojs/netlify v6.
