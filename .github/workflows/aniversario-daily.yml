name: Reporte aniversario diario

on:
  schedule:
    # 12:00 UTC ≈ 09:00 Chile en invierno (CLT) / 08:00 en verano (CLST).
    # GitHub Actions cron corre siempre en UTC.
    - cron: "0 12 * * *"
  # Permite disparar manualmente desde la UI de GitHub para testear.
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger report endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET no configurado en GitHub Secrets"
            exit 1
          fi
          echo "Disparando reporte diario…"
          RESPONSE=$(curl -fsS -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://latiendatcg.netlify.app/api/aniversario/report")
          echo "$RESPONSE"
